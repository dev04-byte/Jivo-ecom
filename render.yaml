services:
  # Web Service for the Express backend and React frontend
  - type: web
    name: jivo-ecom-app
    runtime: node
    region: oregon # You can change to singapore, frankfurt, etc.
    plan: free # Start with free tier, upgrade as needed
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # PostgreSQL Database URL (will be auto-filled by Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: jivo-ecom-db
          property: connectionString
      # SQL Server Configuration
      - key: SQLSERVER_HOST
        sync: false
      - key: SQLSERVER_PORT
        sync: false
      - key: SQLSERVER_USER
        sync: false
      - key: SQLSERVER_PASSWORD
        sync: false
      - key: SQLSERVER_DATABASE
        sync: false
      - key: SQLSERVER_ENCRYPT
        value: false
      - key: SQLSERVER_TRUST_SERVER_CERT
        value: true
      # Application Configuration
      - key: SESSION_SECRET
        generateValue: true
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_PATH
        value: ./uploads
      - key: LOG_LEVEL
        value: info
      # CORS (update with your actual Render URL)
      - key: CORS_ORIGIN
        value: https://jivo-ecom-app.onrender.com

databases:
  # PostgreSQL Database
  - name: jivo-ecom-db
    region: oregon # Must match the web service region
    plan: free # Start with free tier
    databaseName: ecom
    user: postgres